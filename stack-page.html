<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #262624;
    font-family: 'Courier New', Courier, monospace;
    color: #e6edf3;
    min-height: 100vh;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #484f58;
    padding: 32px 48px 14px;
  }
  .artifact-block {
    margin-bottom: 48px;
  }
  .artifact-frame {
    border-top: 0.5px solid #30363d;
    border-bottom: 0.5px solid #30363d;
    background: #262624;
  }
  .artifact-frame img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="artifact-block">
  <div class="section-label">Stack</div>
  <div class="artifact-frame">
    <img src="stack-map.png" alt="Stack Map" width="2160" height="1320">
  </div>
</div>

<div class="artifact-block">
  <div class="section-label">Quick Ref</div>
  <div class="artifact-frame">
    <img src="quick-ref.png" alt="Quick Reference" width="2160" height="3200">
  </div>
</div>

</body>
</html>
