<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'Courier New', Courier, monospace;
    color: #e6edf3;
    padding: 64px 48px 80px;
    min-height: 100vh;
  }
  .page-header {
    margin-bottom: 56px;
  }
  .page-eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #484f58;
    margin-bottom: 6px;
  }
  .page-title {
    font-size: 18px;
    font-weight: 500;
    color: #e6edf3;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .page-subtitle {
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 0.06em;
  }
  .divider-h {
    height: 0.5px;
    background: #30363d;
    margin: 24px 0 0;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #484f58;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: #21262d;
  }
  .artifact-block {
    margin-bottom: 56px;
  }
  .artifact-frame {
    border-radius: 12px;
    border: 0.5px solid #30363d;
    overflow: hidden;
    background: #262624;
  }
  .artifact-frame img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-eyebrow">Inverted Capital</div>
  <div class="page-title">The Stack</div>
  <div class="page-subtitle">Agentic workflows powering the investment operation</div>
  <div class="divider-h"></div>
</div>

<div class="artifact-block">
  <div class="section-label">Stack Map</div>
  <div class="artifact-frame">
    <img src="stack-map.png" alt="Stack Map" width="1080" height="660">
  </div>
</div>

<div class="artifact-block">
  <div class="section-label">Quick Reference</div>
  <div class="artifact-frame">
    <img src="quick-ref.png" alt="Quick Reference" width="1080" height="1600">
  </div>
</div>

</body>
</html>
