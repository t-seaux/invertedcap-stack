<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d1117;
    overflow-x: hidden;
  }
  .page-wrap {
    padding: 40px 40px 60px;
  }
  .page-date {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 24px;
  }
  .artifact-frame {
    border-radius: 10px;
    border: 0.5px solid #30363d;
    overflow: hidden;
    background: #262624;
  }
  .artifact-frame img {
    display: block;
    width: 100%;
    height: auto;
  }
  .artifact-frame + .artifact-frame {
    margin-top: 32px;
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-date">Updated March 31, 2026</div>

  <div class="artifact-frame">
    <img src="stack-map.png" alt="Stack">
  </div>

  <div class="artifact-frame">
    <img src="quick-ref.png" alt="Quick Ref">
  </div>

</div>
</body>
</html>
